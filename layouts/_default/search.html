{{- define "main"}}
<div class="search-page">
    <div class="search-page__header">
        <h1 class="search-page__title">Search &amp; Explore</h1>
        <p class="search-page__desc">Find articles, filter by tag, or just browse.</p>
    </div>

    <div class="search-page__box">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="searchInput" autofocus placeholder="{{ .Params.placeholder | default " Search articles... "}}" aria-label="Search" autocomplete="off" maxlength="64">
    </div>

    <div class="search-page__tags" id="tag-filters">
        <span class="search-page__tags-label">Filter by tag:</span> {{- range $name, $tax := site.Taxonomies.tags }}
        <button class="tag-chip" data-tag="{{ $name | lower }}" type="button">{{ $name }}
            <span class="tag-chip__count">{{ len $tax }}</span>
        </button> {{- end }}
    </div>

    <ul id="searchResults" class="search-page__results" aria-label="Search results" aria-live="polite"></ul>
</div>

<script>
    (function() {
        var INDEX_URL = '{{ ("index.json" | absURL) }}';
        var input = document.getElementById('searchInput');
        var results = document.getElementById('searchResults');
        var tagButtons = document.querySelectorAll('.tag-chip');
        var activeTag = null;
        var allPosts = null;

        /* Pre-fill from ?q=query param */
        var params = new URLSearchParams(location.search);
        if (params.get('q')) input.value = params.get('q');

        function esHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function hl(text, q) {
            if (!q) return esHtml(text);
            var re = new RegExp('(' + q.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
            return esHtml(text).replace(re, '<mark>$1</mark>');
        }

        function loalIndex(cb) {
            if (allPosts) {
                cb(allPosts);
                return;
            }
            fetch(INDEX_URL).then(function(r) {
                return r.json();
            }).then(function(d) {
                allPosts = d;
                cb(d);
            }).catch(function() {});
        }

        function filterPosts(data, query, tag) {
            var q = (query || '').toLowerCase().trim();
            return data.filter(function(item) {
                var matchTag = !tag || (item.tags || []).map(function(t) {
                    return t.toLowerCase();
                }).includes(tag);
                if (!matchTag) return false;
                if (!q) return true;
                return (item.title && item.title.toLowerCase().includes(q)) ||
                    (item.summary && item.summary.toLowerCase().includes(q)) ||
                    (item.content && item.content.toLowerCase().includes(q));
            });
        }

        function renderResults(posts, query) {
            if (posts.length === 0) {
                results.innerHTML = '<li class="search-page__empty">No articles found. Try a different search term or tags.</li>';
                return;
            }
            results.innerHTML = posts.map(function(item) {
                var date = item.date ? new Date(item.date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                }) : '';
                var tags = (item.tags || []).map(function(t) {
                    return '<button class="tag-chip tag-chip--sm" data-tag="' + esHtml(t.toLowerCase()) + '" type="button">' + esHtml(t) + '</button>';
                }).join(' ');
                var summary = item.summary ? hl(item.summary.substring(0, 140), query) + '...' : '';
                return '<li class="search-page__result">' +
                    '<a href="' + esHtml(item.permalink) + '" class="spr__link">' +
                    '<div class="spr__body">' +
                    '<h3 class="spr__title">' + hl(item.title, query) + '</h3>' +
                    (summary ? '<p class="spr__summary">' + summary + '</p>' : '') +
                    '</div>' +
                    '</a>' +
                    '<div class="spr__meta">' +
                    (date ? '<span class="spr__date">' + date + '</time>' : '') +
                    (tags ? '<span class="spr__tags">' + tags + '</span>' : '') +
                    '</div>' +
                    '</li>';
            }).join('');

            /* Re-bind tag clicks inside results */
            results.querySelectorAll('.tag-chip').forEach(bindTagChip);
        }

        function update() {
            loalIndex(function(data) {
                renderResults(filterPosts(data, input.value, activeTag), input.value.trim());
            });
        }

        function bindTagChip(btn) {
            btn.addEventListener('click', function() {
                var tag = btn.dataset.tag;
                if (activeTag === tag) {
                    activeTag = null;
                    document.querySelectorAll('.tag-chip').forEach(function(b) {
                        b.classList.remove('is-active');
                    });
                } else {
                    activeTag = tag;
                    document.querySelectorAll('.tag-chip').forEach(function(b) {
                        b.classList.toggle('is-active', b.dataset.tag === tag);
                    });
                }
                update();
            });
        }

        tagButtons.forEach(bindTagChip);
        input.addEventListener('input', update);
        update();
    })();
</script>
{{- end }}
