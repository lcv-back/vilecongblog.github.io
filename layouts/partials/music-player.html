{{- /* Hidden YouTube audio — auto-plays on page load */ -}} {{- $videoID := site.Params.musicVideoID | default "ZX2mjf9dFH8" }}
<div id="yt-hidden-player" aria-hidden="true" style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;bottom:0;right:0;overflow:hidden;"></div>
<script>
    (function() {
        var VIDEO_ID = '{{ $videoID }}';
        var player, playerReady = false;

        var musicBtn = document.getElementById('music-btn');

        function setIcon(playing) {
            if (musicBtn) musicBtn.setAttribute('data-playing', playing ? '1' : '0');
        }

        /* Load YT API immediately on page load */
        function loadYT() {
            if (window.YT && window.YT.Player) {
                createPlayer();
                return;
            }
            if (document.getElementById('yt-api-script')) return;
            var s = document.createElement('script');
            s.id = 'yt-api-script';
            s.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(s);
        }

        window.onYouTubeIframeAPIReady = function() {
            createPlayer();
        };

        function createPlayer() {
            if (player) return;
            player = new YT.Player('yt-hidden-player', {
                videoId: VIDEO_ID,
                width: 1,
                height: 1,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    rel: 0,
                    loop: 1,
                    playlist: VIDEO_ID,
                    mute: 0
                },
                events: {
                    onReady: function(e) {
                        playerReady = true;
                        e.target.setVolume(50);
                        e.target.playVideo();
                    },
                    onStateChange: function(e) {
                        var playing = (e.data === YT.PlayerState.PLAYING);
                        setIcon(playing);
                    },
                    onError: function() {
                        setIcon(false);
                    }
                }
            });
        }

        /* Toggle on button click */
        if (musicBtn) {
            musicBtn.addEventListener('click', function() {
                if (!player || !playerReady) {
                    loadYT();
                    return;
                }
                var state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            });
        }

        /* Auto-load on page ready */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadYT);
        } else {
            loadYT();
        }
    })();
</script>
