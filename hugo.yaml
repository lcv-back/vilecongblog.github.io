baseURL: "https://lcv-back.github.io/vilecongblog.github.io/"
languageCode: "en-us"
title: "Vilecong Blog"
theme: "PaperMod"

# Hỗ trợ tiếng Việt nếu bạn viết bài bằng tiếng Việt
hasCJKLanguage: true

# Dùng đường dẫn tương đối để fix lỗi subfolder
relativeURLs: true

params:
  env: production
  description: "Software Engineer | Tech Enthusiast"
  author: "Vilecong"

  # Cấu hình giao diện chung
  defaultTheme: light # Sử dụng theme sáng để CSS màu kem hoạt động
  disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullContent: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # Home Page Configuration - Profile Style Layout
  profileMode:
    enabled: true
    title: "Vilecong"
    subtitle: "Software Engineer | Tech Enthusiast and Blogger"
    imageUrl: "images/avatar.jpg" # Avatar image from static/images
    imageWidth: 300
    imageHeight: 300
    imageTitle: "Avatar"
    buttons:
      - name: "BIO"
        url: "/about"
      - name: "PORTFOLIO"
        url: "/portfolio"
      - name: "BLOG"
        url: "/posts"

  # Cấu hình hiển thị danh sách bài viết (Quan trọng để giống mẫu)
  label:
    text: "🏠 Home"

  # Social Icons
  socialIcons:
    - name: "github"
      url: "https://github.com/lcv-back"
    - name: "linkedin"
      url: "https://linkedin.com/in/vilecong"

# Cấu hình Menu (Header bên phải)
menu:
  main:
    - name: "Feed"
      url: "/"
      weight: 10
    - name: "Posts"
      url: "/posts/"
      weight: 20
    - name: "About"
      url: "/about/"
      weight: 30

# Cấu hình Markup để hỗ trợ hiển thị code đẹp hơn
markup:
  goldmark:
    renderer:
      unsafe: true # Cho phép dùng HTML trong Markdown nếu cần
  highlight:
    noClasses: false
    style: "monokai" # Tông màu tối cho code
