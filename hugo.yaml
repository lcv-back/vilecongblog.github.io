baseURL: "https://lcv-back.github.io/vilecongblog.github.io/"
languageCode: "en-us"
title: "CodeForFun"
theme: "PaperMod"

# Hỗ trợ tiếng Việt
hasCJKLanguage: true
relativeURLs: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "Software Engineer | Tech Enthusiast"
  author: "ViLe"

  # Cấu hình giao diện chuẩn PaperMod
  defaultTheme: auto
  disableThemeToggle: false
  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

  # TẮT ProfileMode để tạo giao diện Banner tùy chỉnh
  profileMode:
    enabled: false

  # Cấu hình Label (Logo)
  label:
    text: "CodeForFun"
    image: "images/profile.jpg"

  # Search (Fuse.js)
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "Blog"
      url: "/posts/"
      weight: 20

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: "monokai"
