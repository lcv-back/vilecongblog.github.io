baseURL: "https://lcv-back.github.io/vilecongblog.github.io/"
languageCode: "en-us"
title: "Vilecong Blog"
theme: "PaperMod"

# Hỗ trợ tiếng Việt
hasCJKLanguage: true
relativeURLs: true

params:
  env: production
  description: "Software Engineer | Tech Enthusiast"
  author: "Vilecong"

  # Cấu hình giao diện chuẩn PaperMod
  defaultTheme: light
  disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullContent: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # TẮT ProfileMode để tạo giao diện Banner tùy chỉnh
  profileMode:
    enabled: false

  # Cấu hình Label (Logo)
  label:
    text: "G Agrab"

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "About"
      url: "/about/"
      weight: 20
    - name: "Service"
      url: "/portfolio/"
      weight: 30
    - name: "Blog"
      url: "/posts/"
      weight: 40

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: "monokai"
