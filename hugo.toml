baseURL: "https://vilecongblog.github.io/"
languageCode: "en-us"
title: "Vilecong Blog"
theme: "PaperMod"

# Hỗ trợ tiếng Việt nếu bạn viết bài bằng tiếng Việt
hasCJKLanguage: true 

params:
  env: production
  description: "Software Engineer | Tech Enthusiast"
  author: "Vilecong"
  
  # Cấu hình giao diện chung
  defaultTheme: dark # Ép buộc dùng giao diện tối như mẫu
  disableThemeToggle: false
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullContent: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # Home Page Configuration (Ảnh 2 dùng Home-Layout với Profile phía trên)
  profileMode:
    enabled: true
    title: "Vilecong's Blog"
    subtitle: "🚀 Software Engineer | Sharing my tech journey and stories."
    imageUrl: "https://github.com/vilecongblog.png" # Tự động lấy avatar Github
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: "Feed"
        url: "/"
      - name: "Posts"
        url: "/posts"
      - name: "About"
        url: "/about"

  # Cấu hình hiển thị danh sách bài viết (Quan trọng để giống mẫu)
  label:
    text: "🏠 Home"
  
  # Social Icons
  socialIcons:
    - name: "github"
      url: "https://github.com/vilecongblog"
    - name: "linkedin"
      url: "https://linkedin.com/in/your-profile"

# Cấu hình Menu (Header bên phải)
menu:
  main:
    - name: "Feed"
      url: "/"
      weight: 10
    - name: "Posts"
      url: "/posts/"
      weight: 20
    - name: "About"
      url: "/about/"
      weight: 30

# Cấu hình Markup để hỗ trợ hiển thị code đẹp hơn
markup:
  goldmark:
    renderer:
      unsafe: true # Cho phép dùng HTML trong Markdown nếu cần
  highlight:
    noClasses: false
    style: "monokai" # Tông màu tối cho code